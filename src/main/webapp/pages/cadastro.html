<!DOCTYPE html>

<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/cadastro.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="´tituloCadastro">Sistema de estoque</h1>
            <nav>
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <form action="/Cadastro" method="POST">
                <div class="container">
                    <div class="dadosPessoais">
                        <label for="nameFist">Nome</label>
                        <input type="text" name="nameFist" id="namefist" placeholder="Digite o seu nome" />
                        <label for="sobrenome">Sobrenome</label>
                        <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite o seu sobrenome" />
                        <label for="matricula">Matricula</label>
                        <input type="text" name="matricula" id="matricula" placeholder="Digite o sua matricula" />
                        <label for="cpf">Cpf</label>
                        <input type="text" name="cpf" id="cpf" placeholder="Digite o seu cpf" />
                        <p>Sexo</p>
                        <select name="sexo">
                            <option value="">Selecione o sexo</option>
                            <option value="">Masculino</option>
                            <option value="">Feminino</option>
                        </select>
                        <label for="dtaNascimento">Data de nascimento</label>
                        <input type="date" name="dtaNascimento" id="dtaNascimento"/>
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" placeholder="xxxxxxxxxxxx@xxxx.xxx"/>
                        <label for="telefone">Telefone</label>
                        <input type="tel" name="telefone" id="telefone" placeholder="(00)0000-0000"/>
                        <label for="funcao">Função</label>
                        <input type="text" name="funcao" id="funcao" placeholder="Digite a sua função"/>
                        
                    </div>
                    <div class="containerEndereco">
                        <label for="cep">Cep</label>
                        <input type="text" name="cep" id="cep"/>
                        <label for="endereco">Endereço</label>
                        <input type="text" name="endereco" id="endereco"/>
                        <label for="cidade">Cidade</label>
                        <input type="text" name="cidade" id="cidade"/>
                        <label for="bairro">Bairro</label>
                        <input type="text" name="bairro" id="bairro"/>
                        <label for="estado">Estado</label>
                        <input type="text" name="estado" id="estado"/>                       
                        <label for="numero">Numero</label>
                        <input type="text" name="numero" id="numero"/>
                        <label for="complemento">Complemento</label>
                        <input type="text" name="complemento" id="complemento"/>
                    </div>
                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>
                </div>
            </form>
        </main>
        <script src="../js/cep.js"></script>
    </body>
</html>
